<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <form>
      <h2>Temperature conversion </h2>
      <br />
      <input type="number" id="text" placeholder="Enter temperature" /><br />

      <input type="radio" id="toce" name="unit" />
      <label for="toce">Fahrenheit > Celsius</label><br />
      <input type="radio" id="tofa" name="unit" />
      <label for="tofa">Celsius > Fahrenheit</label><br />
      <button id="submit" type="button" onclick="call()">Submit</button>
      <p id="result"></p>
    </form>

    <script src="js.js"></script>
  </body>
</html>
